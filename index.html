<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>22B Project 4</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uikit@3.23.0/dist/css/uikit.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/uikit@3.23.0/dist/js/uikit.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <!-- Nav -->
  <nav id="nav-bar" class="uk-navbar-container uk-navbar-sticky" uk-navbar>
    <div class="uk-navbar-left nav-bar-text">
      <span class="nav-bar-text uk-navbar-item uk-logo uk-margin-left">CIS 22B Project 4: Snake</span>
    </div>
    <div class="uk-navbar-right">
      <label for="manual-toggle-btn" class="nav-bar-text">Recorded</label>
      <input id="manual-toggle-btn" type="checkbox" class="uk-switch">
      <label for="manual-toggle-btn" class="uk-margin-right nav-bar-text">Manual</label>
    </div>
  </nav>

  <!-- Main container -->
  <div class="main-container">
    <div>
      <canvas id="main-canvas"></canvas>
      <div class="vt100" id="status-line"></div>
    </div>
  </div>

  <!-- Footer -->
  <div id="footer-bar" class="uk-flex uk-padding uk-flex-between">
    <div class="uk-flex">
      <button id="playback-btn" class="uk-button" style="min-width: 75px;" disabled>
        <i class="fa fa-pause"></i>
      </button>
      <input id="timeout-slider" class="uk-range uk-margin-small-left" type="range" min="0" max="4" step="1" value="2"
        style="width: 100px;">
    </div>

    <div class="uk-flex">
      <div uk-form-custom="target: true">
        <input type="file" id="fileInput">
        <button id="upload-btn" class="uk-button uk-margin-right" type="button">Upload Key File</button>
      </div>
      <button id="submit-btn" class="uk-button uk-button-primary" disabled>Submit</button>
    </div>
  </div>

  <!-- Submit Modal -->
  <div id="submit-modal" uk-modal>
    <div class="uk-modal-dialog uk-modal-body">
      <h2 class="uk-modal-title">Submit Key File</h2>

      <form id="submit-form">
        <div class="uk-margin">
          <label class="uk-form-label" for="first-name">First Name</label>
          <input class="uk-input" id="first-name" type="text" required>
        </div>

        <div class="uk-margin">
          <label class="uk-form-label" for="last-name">Last Name</label>
          <input class="uk-input" id="last-name" type="text" required>
        </div>

        <div class="uk-margin">
          <label class="uk-form-label" for="student-id">Student ID</label>
          <input class="uk-input" id="student-id" type="text" required>
        </div>

        <p id="status-message" class="uk-text-muted uk-margin-small">Please enter your details.</p>

        <div class="uk-flex uk-flex-right uk-margin">
          <button type="button" class="uk-button uk-button-default uk-modal-close">Cancel</button>
          <button type="submit" class="uk-button uk-button-primary">Submit</button>
        </div>
      </form>
    </div>
  </div>

  <script defer type="module" src="./app.js"></script>
</body>

</html>
